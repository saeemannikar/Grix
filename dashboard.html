<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grix · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04040d;--card:#0a0a18;--card2:#0f0f1e;--hover:#121224;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.04);
  --purple:#7b6ef8;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--blue:#60a5fa;
  --ink:#e8e6ff;--muted:#6b6880;--faint:#1a1828;
  --sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* Nav */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;background:rgba(4,4,13,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:600;text-decoration:none;color:var(--ink);letter-spacing:-0.3px}
.nav-logo-icon{width:28px;height:28px;background:var(--purple);border-radius:7px;display:flex;align-items:center;justify-content:center}
.nav-logo-icon svg{width:16px;height:16px}
.nav-right{display:flex;align-items:center;gap:14px}
.badge-live{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--green);background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);padding:3px 10px;border-radius:20px}
.badge-live-dot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.25}}
.btn-back{font-family:var(--mono);font-size:12px;color:var(--muted);text-decoration:none;transition:color 0.2s}
.btn-back:hover{color:var(--ink)}
.btn-install{display:inline-flex;align-items:center;gap:6px;background:var(--purple);color:#fff;font-family:var(--sans);font-size:13px;font-weight:500;padding:7px 16px;border-radius:8px;text-decoration:none;border:none;cursor:pointer;transition:opacity 0.2s}
.btn-install:hover{opacity:0.85}

/* Main */
main{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:36px 24px 80px}

/* Header */
.dash-header{margin-bottom:32px}
.dash-header h1{font-size:26px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px}
.dash-header p{font-family:var(--mono);font-size:12px;color:var(--muted)}
.dash-header p span{color:var(--purple)}

/* No workspace */
.no-ws{text-align:center;padding:100px 24px;display:none}
.no-ws-icon{font-size:52px;margin-bottom:20px}
.no-ws h2{font-size:24px;font-weight:600;letter-spacing:-0.5px;margin-bottom:10px}
.no-ws p{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.6}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:28px}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;transition:border-color 0.2s,transform 0.2s;cursor:default}
.stat-card:hover{border-color:rgba(123,110,248,0.3);transform:translateY(-1px)}
.stat-label{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.09em;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.stat-dot{width:6px;height:6px;border-radius:50%}
.stat-val{font-size:34px;font-weight:700;letter-spacing:-1.5px;line-height:1}
.c-purple{color:var(--purple)}.c-blue{color:var(--blue)}.c-red{color:var(--red)}.c-green{color:var(--green)}.c-yellow{color:var(--yellow)}

/* Filters */
.filter-bar{display:flex;align-items:center;gap:7px;margin-bottom:18px;flex-wrap:wrap}
.filter-btn{font-family:var(--mono);font-size:11px;padding:5px 13px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s}
.filter-btn:hover{border-color:var(--purple);color:var(--ink)}
.filter-btn.active{background:var(--purple);border-color:var(--purple);color:#fff}
.filter-spacer{flex:1}
.days-select{font-family:var(--mono);font-size:11px;background:var(--card);border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:6px;cursor:pointer;outline:none;-webkit-appearance:none}

/* Table */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid var(--border)}
th{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);padding:13px 18px;text-align:left;font-weight:400}
tbody tr{border-bottom:1px solid var(--border2);transition:background 0.15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--hover)}
td{padding:13px 18px;font-size:13px;vertical-align:middle}
.type-badge{font-family:var(--mono);font-size:9px;font-weight:500;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap}
.type-decision{background:rgba(123,110,248,0.15);color:var(--purple)}
.type-task{background:rgba(96,165,250,0.15);color:var(--blue)}
.type-blocker{background:rgba(239,68,68,0.15);color:var(--red)}
.type-approval{background:rgba(34,197,94,0.15);color:var(--green)}
.type-decision_change{background:rgba(234,179,8,0.15);color:var(--yellow)}
.td-title{max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.td-mono{font-family:var(--mono);font-size:11px;color:var(--muted)}
.prio-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.p-high{background:var(--red)}.p-medium{background:var(--yellow)}.p-low{background:var(--muted)}
.due-soon{color:var(--yellow)}.due-over{color:var(--red)}.due-ok{color:var(--muted)}
.empty-state{padding:60px 24px;text-align:center}
.empty-state p{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:10px}
.loading-row td{padding:48px;text-align:center;font-family:var(--mono);font-size:12px;color:var(--muted)}

/* Members panel */
.members-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:24px}
.members-title{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.members-grid{display:flex;flex-wrap:wrap;gap:8px}
.member-chip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:6px 10px;transition:border-color 0.15s}
.member-chip:hover{border-color:rgba(123,110,248,0.3)}
.member-av{width:24px;height:24px;border-radius:6px;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;overflow:hidden}
.member-av img{width:100%;height:100%;object-fit:cover}
.member-name{font-size:12px;font-weight:500}
.member-title{font-family:var(--mono);font-size:10px;color:var(--muted)}

@media(max-width:768px){th:nth-child(4),td:nth-child(4),th:nth-child(5),td:nth-child(5){display:none}}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<nav>
  <a class="nav-logo" href="/">
    <div class="nav-logo-icon"><svg viewBox="0 0 16 16" fill="none"><path d="M3 4h10M3 8h7M3 12h4" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg></div>
    Grix
  </a>
  <div class="nav-right">
    <div class="badge-live"><span class="badge-live-dot"></span>Live</div>
    <a class="btn-back" href="/">← Back</a>
    <a class="btn-install" href="/api/slack/install">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg>
      Add to Slack
    </a>
  </div>
</nav>

<main>
  <!-- No workspace -->
  <div class="no-ws" id="no-ws">
    <div class="no-ws-icon">🔌</div>
    <h2>Connect your workspace</h2>
    <p>Add Grix to your Slack to see your workspace memory here.</p>
    <a class="btn-install" style="font-size:15px;padding:12px 28px;" href="/api/slack/install">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg>
      Add Grix to Slack
    </a>
  </div>

  <!-- Dashboard -->
  <div id="dash">
    <div class="dash-header">
      <h1>Workspace Memory <span id="ws-name" style="color:var(--purple)"></span></h1>
      <p>Last updated <span id="last-updated">—</span></p>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:var(--yellow)"></span>Changes</div><div class="stat-val c-yellow" id="s-changes">—</div></div>
      <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:var(--purple)"></span>Decisions</div><div class="stat-val c-purple" id="s-decisions">—</div></div>
      <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:var(--blue)"></span>Tasks</div><div class="stat-val c-blue" id="s-tasks">—</div></div>
      <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:var(--red)"></span>Blockers</div><div class="stat-val c-red" id="s-blockers">—</div></div>
      <div class="stat-card"><div class="stat-label"><span class="stat-dot" style="background:var(--green)"></span>Approvals</div><div class="stat-val c-green" id="s-approvals">—</div></div>
    </div>


    <!-- Members -->
    <div class="members-panel" id="members-panel" style="display:none;">
      <div class="members-title">
        <span>Team Members</span>
        <span id="members-count" style="color:var(--purple)"></span>
      </div>
      <div class="members-grid" id="members-grid"></div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-type="all">All</button>
      <button class="filter-btn" data-type="decision_change">Changes</button>
      <button class="filter-btn" data-type="decision">Decisions</button>
      <button class="filter-btn" data-type="task">Tasks</button>
      <button class="filter-btn" data-type="blocker">Blockers</button>
      <button class="filter-btn" data-type="approval">Approvals</button>
      <div class="filter-spacer"></div>
      <select class="days-select" id="days-select">
        <option value="7">Last 7 days</option>
        <option value="30" selected>Last 30 days</option>
        <option value="90">Last 90 days</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Type</th><th>Title</th><th>Owner</th><th>Why</th><th>Channel</th><th>Due</th><th>Captured</th></tr>
        </thead>
        <tbody id="tbody">
          <tr class="loading-row"><td colspan="7">Loading workspace memory...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script>
// ── Night sky ─────────────────────────────────────────────────────────────────
(function(){
  const c = document.getElementById('bg-canvas');
  const x = c.getContext('2d');
  let W, H, stars=[], flies=[];
  function resize(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; }
  function initStars(){ stars=[]; for(let i=0;i<180;i++) stars.push({x:Math.random()*W,y:Math.random()*H*0.75,r:Math.random()*1.1+0.2,o:Math.random()*0.5+0.1,t:Math.random()*Math.PI*2,s:Math.random()*0.012+0.004}); }
  function initFlies(){ flies=[]; for(let i=0;i<22;i++) flies.push({x:Math.random()*W,y:Math.random()*H*0.9+H*0.05,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.25,r:Math.random()*1.8+0.8,o:Math.random(),p:Math.random()*Math.PI*2,s:Math.random()*.018+.007,h:Math.random()<.6?260:Math.random()<.5?200:150}); }
  function draw(){
    x.clearRect(0,0,W,H);
    x.fillStyle='#04040d'; x.fillRect(0,0,W,H);
    let g=x.createRadialGradient(W*.15,H*.3,0,W*.15,H*.3,W*.45);
    g.addColorStop(0,'rgba(55,35,150,0.1)'); g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g; x.fillRect(0,0,W,H);
    let g2=x.createRadialGradient(W*.8,H*.2,0,W*.8,H*.2,W*.3);
    g2.addColorStop(0,'rgba(15,70,110,0.07)'); g2.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g2; x.fillRect(0,0,W,H);
    stars.forEach(s=>{ s.t+=s.s; const a=s.o*(0.5+0.5*Math.sin(s.t)); x.beginPath(); x.arc(s.x,s.y,s.r,0,Math.PI*2); x.fillStyle=`rgba(210,205,255,${a})`; x.fill(); });
    flies.forEach(f=>{ f.p+=f.s; f.x+=f.vx+Math.sin(f.p*.7)*.28; f.y+=f.vy+Math.cos(f.p*.5)*.2; if(f.x<0)f.x=W; if(f.x>W)f.x=0; if(f.y<0)f.y=H; if(f.y>H)f.y=0; const gl=f.o*(0.35+0.65*Math.abs(Math.sin(f.p))); const gr=x.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r*9); gr.addColorStop(0,`hsla(${f.h},80%,75%,${gl})`); gr.addColorStop(.4,`hsla(${f.h},70%,60%,${gl*.35})`); gr.addColorStop(1,'rgba(0,0,0,0)'); x.beginPath(); x.arc(f.x,f.y,f.r*9,0,Math.PI*2); x.fillStyle=gr; x.fill(); x.beginPath(); x.arc(f.x,f.y,f.r*.55,0,Math.PI*2); x.fillStyle=`hsla(${f.h},90%,92%,${gl*.85})`; x.fill(); });
    requestAnimationFrame(draw);
  }
  resize(); initStars(); initFlies(); draw();
  window.addEventListener('resize',()=>{ resize(); initStars(); initFlies(); });
})();

// ── Dashboard ─────────────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const wsId   = params.get('workspace_id');

if (!wsId) {
  document.getElementById('no-ws').style.display = 'block';
  document.getElementById('dash').style.display  = 'none';
}

let currentType = 'all', currentDays = 30;

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function timeAgo(iso) {
  if (!iso) return '—';
  const d = Date.now() - new Date(iso).getTime();
  const m = Math.floor(d/60000);
  if (m<60) return m+'m ago';
  const h = Math.floor(m/60);
  if (h<24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}
function dueClass(due) {
  if (!due) return 'due-ok';
  const d = new Date(due) - Date.now();
  if (d<0) return 'due-over';
  if (d<172800000) return 'due-soon';
  return 'due-ok';
}

function renderRows(rows) {
  const tb = document.getElementById('tbody');
  if (!rows.length) {
    tb.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div style="font-size:28px">🔍</div><p>No extractions found for this filter.</p></div></td></tr>`;
    return;
  }
  tb.innerHTML = rows.map(r => `
    <tr>
      <td><span class="type-badge type-${r.type}">${r.type.replace('_',' ')}</span></td>
      <td class="td-title" title="${(r.title??'').replace(/"/g,'&quot;')}">${r.title??'—'}</td>
      <td class="td-mono">${r.owner??'—'}</td>
      <td class="td-mono" style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${(r.reason??'').replace(/"/g,'&quot;')}">${r.reason??'—'}</td>
      <td class="td-mono">${r.source_location?'#'+r.source_location:'—'}</td>
      <td class="td-mono ${dueClass(r.due_date)}">${r.due_date?fmtDate(r.due_date):'—'}</td>
      <td><span class="prio-dot p-${r.priority??'low'}"></span></td>
      <td class="td-mono">${timeAgo(r.created_at)}</td>
    </tr>`).join('');
}

async function load() {
  if (!wsId) return;
  document.getElementById('tbody').innerHTML = '<tr class="loading-row"><td colspan="7">Loading...</td></tr>';
  try {
    const res  = await fetch(`/api/extractions?type=${currentType}&days=${currentDays}&limit=100&workspace_id=${wsId}`);
    const data = await res.json();
    if (data.stats) {
      document.getElementById('s-changes').textContent   = data.stats.decision_changes ?? 0;
      document.getElementById('s-decisions').textContent = data.stats.decisions ?? 0;
      document.getElementById('s-tasks').textContent     = data.stats.tasks ?? 0;
      document.getElementById('s-blockers').textContent  = data.stats.blockers ?? 0;
      document.getElementById('s-approvals').textContent = data.stats.approvals ?? 0;
    }
    document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
    renderRows(data.rows ?? []);
  } catch(err) {
    document.getElementById('tbody').innerHTML = '<tr class="loading-row"><td colspan="7">Failed to load. Check connection.</td></tr>';
  }
}

async function loadWsName() {
  if (!wsId) return;
  try {
    const res  = await fetch(`/api/workspace?workspace_id=${wsId}`);
    const data = await res.json();
    if (data.name) document.getElementById('ws-name').textContent = '· ' + data.name;
  } catch(_) {}
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentType = btn.dataset.type;
    load();
  });
});

document.getElementById('days-select').addEventListener('change', e => {
  currentDays = e.target.value; load();
});

if (wsId) { loadWsName(); load(); loadMembers(); setInterval(load, 30000); }

const installStatus = params.get('install');
if (installStatus === 'success') alert('✅ Grix installed! Invite it to your channels to start tracking.');
else if (installStatus === 'error') alert('❌ Installation failed. Please try again.');
</script>
</body>
</html>
