<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grix · Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #08080f;
      --bg-card:   #0f0f1a;
      --bg-hover:  #13131f;
      --border:    rgba(255,255,255,0.07);
      --purple:    #6366f1;
      --purple-dim:#4547b0;
      --green:     #22c55e;
      --yellow:    #eab308;
      --red:       #ef4444;
      --blue:      #60a5fa;
      --text:      #f1f1f8;
      --muted:     #6b6b8a;
      --mono:      'DM Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* subtle grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 56px;
      background: rgba(8,8,15,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
      text-decoration: none;
      color: var(--text);
    }

    .nav-logo svg { width: 28px; height: 28px; }

    .nav-right { display: flex; align-items: center; gap: 16px; }

    .badge-live {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--green);
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .badge-live span {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .btn-back {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .btn-back:hover { color: var(--text); }

    /* ── Layout ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Header ── */
    .dash-header {
      margin-bottom: 36px;
    }

    .dash-header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .dash-header p {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
    }

    #last-updated { color: var(--purple); }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.2s;
    }

    .stat-card:hover { border-color: rgba(99,102,241,0.3); }

    .stat-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
    }

    .c-decision { color: var(--purple); }
    .c-task     { color: var(--blue); }
    .c-blocker  { color: var(--red); }
    .c-approval { color: var(--green); }

    /* ── Filter tabs ── */
    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: var(--mono);
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover {
      border-color: var(--purple);
      color: var(--text);
    }

    .filter-btn.active {
      background: var(--purple);
      border-color: var(--purple);
      color: #fff;
    }

    .filter-spacer { flex: 1; }

    .days-select {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      outline: none;
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      border-bottom: 1px solid var(--border);
    }

    th {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      padding: 14px 20px;
      text-align: left;
      font-weight: 400;
    }

    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-hover); }

    td {
      padding: 14px 20px;
      font-size: 14px;
      vertical-align: middle;
    }

    /* type badge */
    .type-badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .type-decision { background: rgba(99,102,241,0.15); color: var(--purple); }
    .type-task     { background: rgba(96,165,250,0.15); color: var(--blue); }
    .type-blocker  { background: rgba(239,68,68,0.15);  color: var(--red); }
    .type-approval { background: rgba(34,197,94,0.15);  color: var(--green); }

    .td-title {
      max-width: 340px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .td-owner {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    .td-date {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .td-due {
      font-family: var(--mono);
      font-size: 12px;
      white-space: nowrap;
    }

    .due-soon { color: var(--yellow); }
    .due-over { color: var(--red); }
    .due-ok   { color: var(--muted); }

    /* priority dot */
    .priority-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .p-high   { background: var(--red); }
    .p-medium { background: var(--yellow); }
    .p-low    { background: var(--muted); }

    /* ── Empty / Loading ── */
    .empty-state {
      padding: 64px 24px;
      text-align: center;
    }

    .empty-state p {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
      margin-top: 12px;
    }

    .empty-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .loading-row td {
      padding: 48px;
      text-align: center;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Channel tag ── */
    .channel-tag {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      th:nth-child(4), td:nth-child(4),
      th:nth-child(5), td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="28" height="28" rx="7" fill="#6366f1"/>
      <path d="M7 9h14M7 14h9M7 19h11" stroke="white" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Grix
  </a>
  <div class="nav-right">
    <div class="badge-live"><span></span>Live</div>
    <a class="btn-back" href="/">← Back to site</a>
  </div>
</nav>

<main>
  <div class="dash-header">
    <h1>Workspace Memory</h1>
    <p>Last updated <span id="last-updated">—</span></p>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">
        <span class="stat-dot" style="background:var(--purple)"></span>
        Decisions
      </div>
      <div class="stat-value c-decision" id="s-decisions">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">
        <span class="stat-dot" style="background:var(--blue)"></span>
        Tasks
      </div>
      <div class="stat-value c-task" id="s-tasks">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">
        <span class="stat-dot" style="background:var(--red)"></span>
        Blockers
      </div>
      <div class="stat-value c-blocker" id="s-blockers">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">
        <span class="stat-dot" style="background:var(--green)"></span>
        Approvals
      </div>
      <div class="stat-value c-approval" id="s-approvals">—</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filter-row">
    <button class="filter-btn active" data-type="all">All</button>
    <button class="filter-btn" data-type="decision">Decisions</button>
    <button class="filter-btn" data-type="task">Tasks</button>
    <button class="filter-btn" data-type="blocker">Blockers</button>
    <button class="filter-btn" data-type="approval">Approvals</button>
    <div class="filter-spacer"></div>
    <select class="days-select" id="days-select">
      <option value="7">Last 7 days</option>
      <option value="30" selected>Last 30 days</option>
      <option value="90">Last 90 days</option>
    </select>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Type</th>
          <th>Title</th>
          <th>Owner</th>
          <th>Channel</th>
          <th>Due</th>
          <th>Priority</th>
          <th>Captured</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr class="loading-row"><td colspan="7">Loading workspace memory...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script>
  let currentType = 'all';
  let currentDays = 30;

  function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function formatRelative(iso) {
    if (!iso) return '—';
    const diff = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  function dueClass(due) {
    if (!due) return 'due-ok';
    const diff = new Date(due) - Date.now();
    if (diff < 0) return 'due-over';
    if (diff < 86400000 * 2) return 'due-soon';
    return 'due-ok';
  }

  function renderRows(rows) {
    const tbody = document.getElementById('table-body');
    if (!rows.length) {
      tbody.innerHTML = `
        <tr>
          <td colspan="7">
            <div class="empty-state">
              <div class="empty-icon">🔍</div>
              <p>No extractions found. Invite Grix to a Slack channel and send some messages.</p>
            </div>
          </td>
        </tr>`;
      return;
    }

    tbody.innerHTML = rows.map(r => `
      <tr>
        <td><span class="type-badge type-${r.type}">${r.type}</span></td>
        <td class="td-title" title="${r.title ?? ''}">${r.title ?? '—'}</td>
        <td class="td-owner">${r.owner ?? '—'}</td>
        <td class="channel-tag">${r.source_location ? '#' + r.source_location : '—'}</td>
        <td class="td-due ${dueClass(r.due_date)}">${r.due_date ? formatDate(r.due_date) : '—'}</td>
        <td><span class="priority-dot p-${r.priority ?? 'low'}"></span></td>
        <td class="td-date">${formatRelative(r.created_at)}</td>
      </tr>
    `).join('');
  }

  async function load() {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '<tr class="loading-row"><td colspan="7">Loading...</td></tr>';

    try {
       const res = await fetch(`/api/extraction?type=${currentType}&days=${currentDays}&limit=100`);
      const data = await res.json();

      // Stats
      if (data.stats) {
        document.getElementById('s-decisions').textContent = data.stats.decisions ?? 0;
        document.getElementById('s-tasks').textContent     = data.stats.tasks ?? 0;
        document.getElementById('s-blockers').textContent  = data.stats.blockers ?? 0;
        document.getElementById('s-approvals').textContent = data.stats.approvals ?? 0;
      }

      document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
      renderRows(data.rows ?? []);
    } catch (err) {
      tbody.innerHTML = `<tr class="loading-row"><td colspan="7">Failed to load data. Check your API connection.</td></tr>`;
    }
  }

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentType = btn.dataset.type;
      load();
    });
  });

  // Days select
  document.getElementById('days-select').addEventListener('change', e => {
    currentDays = e.target.value;
    load();
  });

  // Auto-refresh every 30s
  load();
  setInterval(load, 30000);
</script>
</body>
</html>
